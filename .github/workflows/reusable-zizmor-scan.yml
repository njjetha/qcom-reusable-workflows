name: Zizmor Security Scan
on:
  workflow_call:
    inputs:
      config-path:
        required: false
        type: string
        default: ".github/zizmor.yml"

permissions:
  contents: read
  security-events: write   # needed to upload SARIF to Code Scanning

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: >-
            ${{
              github.event.pull_request.number != '' &&
              format('refs/pull/{0}/merge', github.event.pull_request.number) ||
              github.ref
            }}

      # If no repo-local config exists, download the central default from this repo
      - name: Resolve config
        id: config
        run: |
          if [ -f "${{ inputs.config-path }}" ]; then
            echo "path=${{ inputs.config-path }}" >> $GITHUB_OUTPUT
          else
            curl -sSfL \
              "https://raw.githubusercontent.com/qualcomm-linux-stg/qcom-reusable-workflows/zizmor-test/zizmor-default-config.yml" \
              -o zizmor-default-config.yml
            echo "path=zizmor-default-config.yml" >> $GITHUB_OUTPUT
          fi

      - name: Run Zizmor
        id: zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d
        with:
          config: ${{ steps.config.outputs.path }}
          advanced-security: true    # uploads SARIF; ref/sha are correct because we checked out refs/pull/N/merge above
          online-audits: true
        continue-on-error: true

      - name: Fail on high severity findings
        if: steps.zizmor.outcome == 'success' || steps.zizmor.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            SCAN_REF="refs/pull/${{ github.event.pull_request.number }}/merge"
          else
            SCAN_REF="${{ github.ref }}"
          fi

          DISMISSED_JSON='[]'
          if command -v gh &>/dev/null; then
            DISMISSED_JSON=$(gh api \
              "/repos/${{ github.repository }}/code-scanning/alerts?ref=${SCAN_REF}" \
              --paginate \
              2>/dev/null \
              | jq -s 'add // [] | [.[] | select(.state=="dismissed") | .rule.id] | unique' \
              2>/dev/null || echo '[]')
          fi

          HIGH=$(jq --argjson dismissed "$DISMISSED_JSON" '
            [.runs[].results[] | select(.level == "error") |
              select(.ruleId as $id | $dismissed | index($id) == null)
            ] | length
          ' "${{ steps.zizmor.outputs.output-file }}")

          if [ "$HIGH" -gt 0 ]; then
            echo "::error::Zizmor detected $HIGH undismissed high severity finding(s). Fix the vulnerability or raise a dismissal request for org admin approval."
            exit 1
          fi
