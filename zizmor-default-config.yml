rules:
  # Dangerous triggers: pull_request_target and workflow_run run in target repo
  # context while being triggerable by forks — high RCE risk
  dangerous-triggers:
    remap:
      severity: high

  # Require hash-pinned SHAs for all external actions; ref-pin for internal org actions
  unpinned-uses:
    remap:
      severity: high
    config:
      policies:
        "actions/*": hash-pin
        "*": hash-pin

  # Flag jobs/workflows that define permissions at the workflow level rather than
  # the job level — enforces least-privilege, per-job permission scoping
  anonymous-definition:
    remap:
      severity: medium

  # Detect credentials or tokens that may be persisted inside workflow artifacts —
  # artifacts are accessible to anyone with repo read access
  artipacked:
    remap:
      severity: high

  # Block specific actions your org wants to disallow — add to deny list as needed
  forbidden-uses:
    remap:
      severity: high
    config:
      deny: []


  # Secrets used outside a GitHub environment bypass protection rules — high severity by default
  # Add exceptions for secrets that legitimately can't be tied to an environment
  # secrets-outside-env:
  #   config:
  #     allow:
  #       - "SOME_ORG_SECRET"
